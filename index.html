<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Devfinder</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main class="container">
			<header>
				<h1>devfinder</h1>
				<div id="themeToggle" class="theme-toggle">
	LIGHT <img id="themeIcon" src="/assets/icon-sun.svg" alt="" />
</div>
			</header>

			<div class="search-bar">
				<input id="searchInput" type="text" placeholder="Search GitHub username..." />
				<button id="searchBtn">Search</button>
			</div>

			<div class="card">
				<div class="profile">
					<img id="avatar" src="" alt="" />

					<div class="info">
						<div class="top">
							<h2 id="name">???</h2>
							<span id="joinDate">Joined ???</span>
						</div>

						<p id="username" class="username">@???</p>
						<p id="bio" class="bio">???</p>

						<div class="stats">
							<div>
								<span>Repos</span>
								<h3 id="repos">???</h3>
							</div>
							<div>
								<span>Followers</span>
								<h3 id="followers">???</h3>
							</div>
							<div>
								<span>Following</span>
								<h3 id="following">???</h3>
							</div>
						</div>

						<div class="links">
							<p id="location">📍 ???</p>
							<p id="twitter">🐦 ???</p>
							<p id="website">🔗 ???</p>
							<p id="company">🏢 ???</p>
						</div>
					</div>
				</div>
			</div>
		</main>
    <script src="app.js"></script>
	</body>
</html>
